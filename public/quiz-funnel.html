<script>
/* =========================================================

   • Sleep & Mood lead the quiz (12/17 flagged them hardest)

const CLUSTERS = [

];

/* echo = how this answer is played back on the paywall when rated Often/Sometimes-high */
const QUESTIONS = [

  {c:1,t:"I walk into rooms and forget why I'm there, or lose words mid-sentence.",h:"",echo:"Brain fog — losing words mid-sentence"},
  {c:1,t:"I feel a low hum of anxiety or dread — with no obvious cause.",h:"",echo:"Anxiety with no obvious cause"},
  {c:1,t:"I catch myself thinking: \u201CI don't feel like me anymore.\u201D",h:"",echo:"\u201CI don't feel like me anymore\u201D"},
  // CYCLE
  {c:2,t:"My period has changed — heavier, lighter, closer together, or skipping months entirely.",h:"Any change from YOUR normal counts.",echo:"Your cycle changing on you"},
  {c:2,t:"PMS feels more intense than it used to — or shows up at random times of the month.",h:"",echo:"PMS that's more intense, less predictable"},
  {c:2,t:"I get new breast tenderness, bloating, or headaches around my cycle.",h:"",echo:"New tenderness, bloating, or headaches"},
  {c:2,t:"My symptoms come in waves — good weeks, then weeks where everything falls apart.",h:"This pattern has a hormonal signature.",echo:"Good weeks, then weeks where it all falls apart"},
  // BODY
  {c:3,t:"Waves of heat rise up my chest, neck, or face — even in a cool room.",h:"",echo:"Heat waves rising out of nowhere"},
  {c:3,t:"My heart races or flutters out of nowhere.",h:"Many women are checked for heart issues before anyone mentions hormones.",echo:"Heart racing or fluttering unexpectedly"},
  {c:3,t:"I have new joint aches or stiffness — like my body aged overnight.",h:"",echo:"Joints aching like you aged overnight"},
  {c:3,t:"Weight is settling around my middle — no matter what I eat or how I train.",h:"",echo:"Weight settling at your middle despite everything"},
  // SELF
  {c:4,t:"My desire for intimacy has dropped — or sex is uncomfortable in ways it wasn't before.",h:"",echo:"The spark fading — and missing it"},
  {c:4,t:"My hair is thinning, or my skin and nails have changed.",h:"",echo:"Hair, skin, and nails changing"},
  {c:4,t:"Some days I cancel plans because I just can't face people.",h:"",echo:"Canceling plans because you can't face people"},
  {c:4,t:"Sometimes I look in the mirror and don't recognize the woman looking back.",h:"",echo:"Not recognizing the woman in the mirror"},
];

const OPTS = [{label:"Never",v:0},{label:"Rarely",v:1},{label:"Sometimes",v:2},{label:"Often",v:3}];

const INTERSTITIALS = {
  4:{ type:"edu", eyebrow:"The 3 a.m. club", stat:"2–4", statsub:"a.m.",
      h:"That middle-of-the-night wake-up has a name.",
      p:"Falling progesterone — your body's natural calming hormone — is one of the earliest shifts of perimenopause, and broken sleep is its signature. It gets labeled \u201Cstress\u201D or \u201Canxiety.\u201D It's neither. Your sleep pattern is the first key to your profile."},
  8:{ type:"effect" },
  12:{ type:"proof" },
  16:{ type:"edu", eyebrow:"It's not discipline. It's chemistry.", stat:"Midlife", statsub:"metabolism shift",
      h:"When estrogen declines, your body changes how it stores fat and handles blood sugar.",
      p:"The workouts and diets that always worked can simply stop working. This is one of the most fixable parts of the transition — once you address the actual cause. One section left."},
};

/* Proof stories — REPLACE with real, released member stories, matched to cluster.
   Format: real first name + age + specific symptom → specific change → timeframe. */
const PROOF = {
  sleep:{name:"Dana, 49 — Austin, TX",quote:"\u201CI hadn't slept through the night in two years. Week one I used the 3 A.M. Protocol twice. By week three I was sleeping straight through most nights — I'd forgotten what waking up rested even felt like.\u201D"},
  mood:{name:"Michelle, 46 — Columbus, OH",quote:"\u201CI thought I'd become someone I didn't like — snapping at my kids, crying in the car for no reason. Turns out I was running on empty hormones, not a bad personality. Around week two, the fog started lifting.\u201D"},
  cycle:{name:"Jenn, 44 — Portland, OR",quote:"\u201CMy symptoms made no sense until I saw them mapped against my cycle. Good weeks, hell weeks — there was a pattern all along. Just knowing that changed how I plan my whole month.\u201D"},
  body:{name:"Lisa, 51 — Tampa, FL",quote:"\u201CThe night sweats and the weight that wouldn't move — I blamed myself for both. I changed how I eat breakfast and trained her way twice a week. Two months in, my clothes fit again and the 2 p.m. crash is gone.\u201D"},
  self:{name:"Andrea, 48 — Denver, CO",quote:"\u201CI didn't recognize myself in the mirror and I'd quietly stopped making plans. Six weeks in, I caught myself laughing at dinner and thought — there she is.\u201D"},

const BANDS = [
  {min:0,max:14,name:"Early Signals",copy:"Your symptom load is still light — which makes this the single best moment to act. Women who prepare in this window report the smoothest transitions."},
  {min:15,max:29,name:"The Shift Has Begun",copy:"Your pattern is consistent with active hormonal transition. Symptoms at this level rarely resolve on their own — but they respond well to the right protocol."},
  {min:30,max:44,name:"Full Transition Pattern",copy:"Your answers show a significant, multi-system perimenopause pattern. This is the stage where most women finally seek help — and where the right plan changes everything."},
  {min:45,max:60,name:"High-Impact Perimenopause",copy:"Your symptom load is heavy across multiple systems. You should not be white-knuckling through this — targeted support exists, and it works."},
];

const DOMINANT_COPY = {
  sleep:"Sleep is your loudest signal. This is the progesterone story — and because sleep loss amplifies every other symptom, your plan starts here for the fastest relief.",
  mood:"Your nervous system is carrying the biggest load. Mood, memory, and anxiety changes are hormonal, not personal failure. Your plan leads with the mind-hormone connection.",

/* -------------- state -------------- */
let state = {age:null,cycleStatus:null,answers:[],intent:null,email:"",checkpoints:{},history:[]};
let current = {name:"landing"};
const app=document.getElementById("app"),prog=document.getElementById("prog"),
      stepnum=document.getElementById("stepnum"),backBtn=document.getElementById("backBtn");
backBtn.addEventListener("click",goBack);
const TOTAL_STEPS = 2 + QUESTIONS.length + 2; // age + cycle + 20 Qs + intent + email

function setProgress(step){
  if(step==null){prog.style.width="0%";stepnum.textContent="";backBtn.classList.remove("show");return;}
  prog.style.width=Math.min(100,Math.round(step/TOTAL_STEPS*100))+"%";
  stepnum.textContent=step+"/"+TOTAL_STEPS;
  backBtn.classList.toggle("show",state.history.length>0);
}
function go(screen,push=true){ if(push&&current)state.history.push(current); current=screen; render(); }
function goBack(){ const p=state.history.pop(); if(p){current=p;render();} }
function render(){
  app.innerHTML="";
  const s=document.createElement("div"); s.className="screen";
  ROUTES[current.name](s,current); app.appendChild(s); window.scrollTo(0,0);
}

/* -------------- routes -------------- */
const ROUTES = {

  landing(s){

      <div class="eyebrow">The 3-Minute Assessment</div>
      <h1>Is it perimenopause — or something else?</h1>
      <p class="sub">The 3 a.m. wake-ups. The snapping, the fog, the \u201CI don't feel like me.\u201D 24 questions to find out what's really going on — and exactly what to do about it.</p>
      <div class="trustline">
        <div class="trust"><b>24</b><span>questions</span></div>
        <div class="trust"><b>3 min</b><span>to complete</span></div>
        <div class="trust"><b>5</b><span>systems scored</span></div>
      </div>
      <button class="cta" id="start">Start my assessment</button>
      <p class="disclaimer">This assessment is for informational and self-reflection purposes only and is not a substitute for professional medical advice, diagnosis, or treatment. Reviewed by [clinician name, credentials].</p>`;
    s.querySelector("#start").onclick=()=>go({name:"age"});
  },

  age(s){
    setProgress(1);
    s.innerHTML=`<div class="cluster-tag">About you</div>
      <p class="qtext">How old are you?</p>
      <p class="qhint">Your age helps us place your symptoms on the transition timeline.</p>
      <div class="opts"></div>`;
    const wrap=s.querySelector(".opts");
    ["Under 35","35–39","40–44","45–49","50–55","56+"].forEach((a,i)=>{
      const b=document.createElement("button");b.className="opt";b.textContent=a;
      b.onclick=()=>{state.age=i;go({name:"cycle"});};wrap.appendChild(b);
    });
  },

  cycle(s){
    setProgress(2);
    s.innerHTML=`<div class="cluster-tag">About you</div>
      <p class="qtext">Which best describes your period right now?</p>
      <p class="qhint">This is the single most important staging question.</p>
      <div class="opts"></div>`;
    const wrap=s.querySelector(".opts");
    [{t:"Regular, like clockwork",sub:"Same as it's always been",v:0},
     {t:"Still regular — but different",sub:"Heavier, lighter, shorter, or new PMS",v:1},
     {t:"Irregular",sub:"Closer together or further apart",v:2},
     {t:"I skip months",sub:"60+ day gaps sometimes",v:3},
     {t:"No period for 12+ months",sub:"",v:4},
     {t:"I can't tell",sub:"IUD, ablation, or hysterectomy",v:5}
    ].forEach(o=>{
      const b=document.createElement("button");b.className="opt";
      b.innerHTML=o.t+(o.sub?`<small>${o.sub}</small>`:"");
      b.onclick=()=>{state.cycleStatus=o.v;go({name:"q",idx:0});};wrap.appendChild(b);
    });
  },

  q(s,ctx){
    const i=ctx.idx; setProgress(3+i);
    const q=QUESTIONS[i];
    s.innerHTML=`<div class="cluster-tag">${CLUSTERS[q.c].label}</div>
      <p class="qtext">${q.t}</p>
      <p class="qhint">${q.h||"How often is this true for you?"}</p>
      <div class="opts"></div>`;
    const wrap=s.querySelector(".opts");
    OPTS.forEach(o=>{
      const b=document.createElement("button");b.className="opt";b.textContent=o.label;
      b.onclick=()=>{
        state.answers[i]=o.v;
        const next=i+1;
        if(INTERSTITIALS[next]&&next<QUESTIONS.length){go({name:"inter",idx:next});}
        else if(next>=QUESTIONS.length){go({name:"intent"});}
        else{go({name:"q",idx:next});}
      };wrap.appendChild(b);
    });
  },

  inter(s,ctx){
    const info=INTERSTITIALS[ctx.idx]; setProgress(3+ctx.idx);

/* -------------- helpers -------------- */
function trialEndString(){
  const d=new Date();d.setDate(d.getDate()+7);
  return d.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
}
function phaseEstimate(total){
  switch(state.cycleStatus){
    case 4:return "Likely postmenopause";
    case 3:return "Late perimenopause";
    case 2:return "Mid perimenopause";
    case 1:return "Early perimenopause";
    case 5:return "Cycle-masked — symptom-staged";
    default:return total>=20?"Very early perimenopause":"Pre-transition";
  }
}
function effectSVG(){
  /* Same five dimensions as her results page — primes the "after" picture */
  const dims=[
    {label:"Sleep",a:30,b:82},{label:"Calm",a:34,b:78},{label:"Energy",a:28,b:74},
    {label:"Comfort",a:38,b:80},{label:"Confidence",a:32,b:84},
  ];
  const W=350,H=190,pad=26,bw=16,gap=7,groupW=(W-2*pad)/dims.length;
  let bars="",labels="";
  dims.forEach((d,i)=>{
    const cx=pad+groupW*i+groupW/2;
    const ha=(H-50)*d.a/100, hb=(H-50)*d.b/100;
    bars+=`<rect x="${cx-bw-gap/2}" y="${H-30-ha}" width="${bw}" height="${ha}" rx="8" fill="#C88AA8"/>
           <rect x="${cx+gap/2}" y="${H-30-hb}" width="${bw}" height="${hb}" rx="8" fill="#7E9B84"/>`;
    labels+=`<text x="${cx}" y="${H-10}" text-anchor="middle" font-size="11.5" fill="#46293F" font-weight="600">${d.label}</text>`;
  });
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" role="img" aria-label="Typical reported difference, unsupported versus with the right plan">
    <line x1="${pad-6}" y1="${H-30}" x2="${W-pad+6}" y2="${H-30}" stroke="#F3E3E9" stroke-width="2"/>
    ${bars}${labels}</svg>`;
}

function projectionSVG(now,target,dateStr){
  const H=170,W=340,pad=34;
  const yFor=v=>pad+(1-v/60)*(H-2*pad);
  const y0=yFor(now),y1=yFor(target);
  return `
  <svg width="100%" viewBox="0 0 ${W} ${H}" role="img" aria-label="Projected symptom load from ${now} to about ${target}">
    <defs>
      <linearGradient id="pj" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#A4688F"/><stop offset="1" stop-color="#7E9B84"/></linearGradient>
      <linearGradient id="pjfill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(164,104,143,.18)"/><stop offset="1" stop-color="rgba(164,104,143,0)"/></linearGradient>
    </defs>
    <line x1="${pad}" y1="${H-pad}" x2="${W-16}" y2="${H-pad}" stroke="#F3E3E9" stroke-width="2"/>
    <path d="M ${pad} ${y0} C ${W*0.4} ${y0}, ${W*0.55} ${y1}, ${W-40} ${y1} L ${W-40} ${H-pad} L ${pad} ${H-pad} Z" fill="url(#pjfill)"/>
    <path d="M ${pad} ${y0} C ${W*0.4} ${y0}, ${W*0.55} ${y1}, ${W-40} ${y1}" fill="none" stroke="url(#pj)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="${pad}" cy="${y0}" r="7" fill="#A4688F"/>
    <circle cx="${W-40}" cy="${y1}" r="9" fill="#7E9B84"/>
    <circle cx="${W-40}" cy="${y1}" r="14" fill="none" stroke="#7E9B84" stroke-opacity=".35" stroke-width="3"/>
    <text x="${pad}" y="${y0-14}" font-size="12" font-weight="700" fill="#46293F">Today · ${now}</text>
    <text x="${W-40}" y="${y1-18}" font-size="12" font-weight="700" fill="#46293F" text-anchor="end">${dateStr} · ~${target}</text>
    <text x="${pad}" y="${H-12}" font-size="10.5" fill="#6E5665">WEEK 0</text>
    <text x="${W-40}" y="${H-12}" font-size="10.5" fill="#6E5665" text-anchor="end">WEEK 4</text>
  </svg>`;
}
function gaugeSVG(pct){
  const angle=Math.PI*(1-pct/100),r=78,cx=100,cy=95;
  const x=cx+r*Math.cos(angle),y=cy-r*Math.sin(angle);
  const large=pct>50?1:0;
  return `
  <svg width="200" height="118" viewBox="0 0 200 118" role="img" aria-label="Symptom load ${pct} percent">
    <path d="M22 95 A78 78 0 0 1 178 95" fill="none" stroke="#F3E3E9" stroke-width="14" stroke-linecap="round"/>
    <path d="M22 95 A78 78 0 ${large} 1 ${x.toFixed(1)} ${y.toFixed(1)}" fill="none" stroke="url(#gg)" stroke-width="14" stroke-linecap="round"/>
    <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#A4688F"/><stop offset="1" stop-color="#C29455"/></linearGradient></defs>
    <text x="100" y="82" text-anchor="middle" font-size="34" font-family="Iowan Old Style,Palatino,Georgia,serif" fill="#46293F" font-weight="600">${pct}</text>
    <text x="100" y="103" text-anchor="middle" font-size="11" fill="#6E5665" letter-spacing="1">SYMPTOM LOAD</text>
  </svg>`;
}
render();
</script>
